services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: music-recommendation-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: music_recommendation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (optional - uncomment if needed)
  # api:
  #   build: .
  #   container_name: music-recommendation-api
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/music_recommendation
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #     - /app/node_modules

volumes:
  postgres_data:
